# Mirror CI for GitHub. GitLab (.gitlab-ci.yml) is the primary pipeline and
# owns the Pages deploy + container image; this keeps a GitHub mirror honest.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      # Both product flavors, with the same four gates as the GitLab
      # build/build-ocm jobs: brand leak (twice), separation (no OCM code in
      # the SBOM Lens bundle), and the counter-check that a passing gate
      # means "correctly excluded", never "silently never built".
      - run: npm run build
      - run: '! grep -riq "OCM Lens" apps/web/dist/index.html apps/web/dist/assets'
      - run: '! grep -raEq "TAR_CORRUPT|ARCHIVE_LIMIT_EXCEEDED|artifact-index\.json|componentReferences|DecompressionStream" apps/web/dist/assets'
      - run: npm run build:ocm
      - run: '! grep -riq "SBOM Lens" apps/web/dist-ocm/index.html apps/web/dist-ocm/assets'
      - run: 'grep -raq "artifact-index.json" apps/web/dist-ocm/assets'

  # Same known-vulnerability gate as the GitLab pipeline (osv-scan job).
  osv-scan:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/google/osv-scanner:latest
    steps:
      - uses: actions/checkout@v4
      - run: /osv-scanner --lockfile=package-lock.json

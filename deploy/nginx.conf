server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers -----------------------------------------------------
    # Defense in depth for an app that parses untrusted files. The CSP allows
    # what the viewer actually needs and nothing else:
    #   connect-src 'self' https:  — "From URL" loads SBOMs from any HTTPS
    #     origin (the target still has to answer CORS). Intranet HTTP sources:
    #     either add `http:` here or (better) use the same-origin proxy below.
    #   style-src 'unsafe-inline'  — inline style attributes (meters, tree
    #     indentation); there are no inline <style> blocks or scripts.
    # NOTE: run the app over HTTPS (or localhost). crypto.subtle — which powers
    # the SHA-1 cascade resolution — only exists in secure contexts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://stats.everbright-it.de; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https:; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    # Hashed build assets are immutable.
    # nginx quirk: a location with its own add_header inherits NOTHING from
    # the server block — the security headers must be repeated here. Keep the
    # two lists in sync.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://stats.everbright-it.de; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https:; worker-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Preconfigured SBOM catalog (optional) --------------------------------
    # Recommended pattern for private registries (e.g. GitLab generic packages):
    # expose the SBOMs SAME-ORIGIN through this proxy and reference them with
    # relative URLs in sbomlens.catalog.json. The read-only token stays here on
    # the server — no CORS, and no tokens in the browser or in the catalog file.
    #
    # SECURITY: enabling this turns the viewer host into an authenticated read
    # path into your registry. Restrict who can reach it (network ACL, VPN, or
    # auth in front of this server), scope the token READ-ONLY to exactly the
    # packages it must serve, and rotate it like any other credential.
    #
    # location /sboms/ {
    #     proxy_pass https://gitlab.example.com/api/v4/projects/42/packages/generic/sboms/;
    #     proxy_set_header PRIVATE-TOKEN "REPLACE_WITH_READ_ONLY_TOKEN";
    #     proxy_hide_header Set-Cookie;
    # }
    #
    # Catalog entry using it:
    #   { "label": "Platform 1.0", "urls": ["sboms/1.0/platform.spdx"] }
}

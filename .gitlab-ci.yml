# test → build → GitLab Pages on the default branch (Pages root = the
# viewer); container image, vsix, image scan, and a self-SBOM on tags, then
# an optional manual publish of each extension to Open VSX.
# Security scanning runs on every push; Renovate runs in its own
# scheduled pipeline (see docs/ci-security.md).
stages: [test, build, deploy, publish]

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SAST_EXCLUDED_PATHS: '**/dist, **/dist-vscode, apps/vscode/media, packages/core/fixtures, apps/web/public/examples'
  # Diagnostic (temporary): the template analyzers finish without writing
  # their gl-*-report.json on this runner; debug logs show why.
  SECURE_LOG_LEVEL: 'debug'

default:
  image: node:22-alpine
  cache:
    key:
      files: [package-lock.json]
    paths: [.npm/]
  before_script:
    - npm ci --cache .npm --prefer-offline

test:
  stage: test
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - npm run lint
    - npm run typecheck
    - npm run test

# Known-vulnerability gate over the lockfile (blocking). Ignores, when ever
# needed, go into osv-scanner.toml; see docs/ci-security.md.
osv-scan:
  stage: test
  image:
    name: ghcr.io/google/osv-scanner:latest
    entrypoint: ['']
  cache: []
  before_script: []
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - /osv-scanner --lockfile=package-lock.json

# The security templates run per push too, but never in the Renovate schedule.
semgrep-sast:
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

secret_detection:
  variables:
    # The signature-verification tests need a committed keypair to sign the
    # fixture. It is a throwaway test key (fixtures/ocm/keys/README.md says so),
    # not a leak — exclude the fixtures tree from the secret scan.
    SECRET_DETECTION_EXCLUDED_PATHS: 'packages/core/fixtures'
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

# Dependency updates as merge requests. Runs ONLY in a scheduled pipeline
# that sets RENOVATE_RUN=true; needs the RENOVATE_TOKEN CI variable
# (bot PAT, scopes api + write_repository). Setup: docs/ci-security.md.
renovate:
  stage: test
  image: renovate/renovate:latest
  cache: []
  before_script: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_RUN == "true"
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: $CI_API_V4_URL
    RENOVATE_REPOSITORIES: $CI_PROJECT_PATH
  script:
    - renovate

build:
  stage: build
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - npm run build
    # Brand-leak gate: the SBOM flavor must not carry OCM-Lens branding.
    - '! grep -riq "OCM Lens" apps/web/dist/index.html apps/web/dist/assets'
    # Separation gate: SBOM Lens is an SPDX viewer. Not one line of the
    # descriptor mapper, the tar reader, or the gzip path may reach its
    # bundle: that is what @sbomlens/core/ocm and HAS_DELIVERIES are for.
    # ("ustar" is NOT a marker: sniffContainer's magic-byte check belongs here.)
    - '! grep -raEq "TAR_CORRUPT|ARCHIVE_LIMIT_EXCEEDED|artifact-index\.json|componentReferences|DecompressionStream" apps/web/dist/assets'
  artifacts:
    paths: [apps/web/dist]
    expire_in: 1 week

# OCM Lens: the second product flavor built from the same codebase.
build-ocm:
  stage: build
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - npm run build:ocm
    # Brand-leak gate: the OCM flavor must not carry SBOM-Lens branding.
    - '! grep -riq "SBOM Lens" apps/web/dist-ocm/index.html apps/web/dist-ocm/assets'
    # Counter-check to the SBOM separation gate: a passing gate must mean
    # "correctly excluded", never "silently never built".
    - 'grep -raq "artifact-index.json" apps/web/dist-ocm/assets'
  artifacts:
    paths: [apps/web/dist-ocm]
    expire_in: 1 week

# Pages serves the viewer itself: https://<namespace>.gitlab.io/<project>/
# IS the app (vite base './' keeps the build relocatable). No landing-repo
# clone, no redirect: the landing page deploys to its own host from its own
# repo and is not part of this deployment.
pages:
  stage: deploy
  dependencies: [build]
  image: alpine:3.22
  cache: []
  before_script: []
  script:
    - rm -rf public
    - cp -a apps/web/dist public
  artifacts:
    paths: [public]
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# VS Code extension packages on tags; publishing them is a manual job below.
vsix:
  stage: deploy
  script:
    - npm run build:vscode -w @sbomlens/web
    - npm run compile -w sbomlens
    - npm run package -w sbomlens
  artifacts:
    paths: [sbomlens.vsix]
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

vsix-ocm:
  stage: deploy
  script:
    - npm run build:vscode-ocm -w @sbomlens/web
    - npm run compile -w ocmlens
    - npm run package -w ocmlens
  artifacts:
    paths: [ocmlens.vsix]
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# Open VSX publishing, one job per product.
#
# MANUAL on purpose. A published version is immutable: it cannot be replaced
# or withdrawn, only superseded by a new version. Tagging must therefore never
# publish by itself: someone decides, per product, that this build is the one
# users get. Manual also keeps the ordering free, which matters while a
# listing is still being bootstrapped (a README that links to a sibling
# extension wants that sibling to exist first).
#
# Setup, once: OVSX_TOKEN as a masked, protected CI variable (Open VSX → user
# settings → access tokens; the account must own the `everbright-it`
# namespace), AND protect the release tags (Settings → Repository → Protected
# tags → `v*`). A protected variable only reaches pipelines on protected refs;
# on an unprotected tag the token arrives empty and the guard below stops the
# job. ovsx picks it up as OVSX_PAT from the environment, so the token never
# appears in a command line, a process list, or the job log.
#
# The VS Code Marketplace jobs below extend the same shape with `vsce publish`.
.ovsx-publish:
  stage: publish
  image: node:22-alpine
  cache: []
  before_script: []
  variables:
    OVSX_VERSION: '1.0.2'
    OVSX_PAT: $OVSX_TOKEN
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

publish-sbomlens:
  extends: .ovsx-publish
  needs: [vsix]
  script:
    - test -n "$OVSX_TOKEN" || { echo "OVSX_TOKEN is not set. Add it as a masked CI variable."; exit 1; }
    # Fail on a bad or expired token before touching the registry.
    - npx --yes ovsx@$OVSX_VERSION verify-pat everbright-it
    # A tag that disagrees with the manifest would publish a mislabelled
    # extension under a version number nobody can correct afterwards.
    - node -e "const v=require('./apps/vscode/package.json').version; if ('v'+v !== process.env.CI_COMMIT_TAG) { console.error(`vsix is ${v}, tag is ${process.env.CI_COMMIT_TAG}`); process.exit(1); }"
    - npx --yes ovsx@$OVSX_VERSION publish sbomlens.vsix

publish-ocmlens:
  extends: .ovsx-publish
  needs: [vsix-ocm]
  script:
    - test -n "$OVSX_TOKEN" || { echo "OVSX_TOKEN is not set. Add it as a masked CI variable."; exit 1; }
    - npx --yes ovsx@$OVSX_VERSION verify-pat everbright-it
    - node -e "const v=require('./apps/vscode-ocm/package.json').version; if ('v'+v !== process.env.CI_COMMIT_TAG) { console.error(`vsix is ${v}, tag is ${process.env.CI_COMMIT_TAG}`); process.exit(1); }"
    - npx --yes ovsx@$OVSX_VERSION publish ocmlens.vsix

# VS Code Marketplace publishing, one job per product. Same shape, same manual
# reasoning, and the same immutability as Open VSX above: the two registries
# are deliberately separate jobs so one can be published without the other.
#
# Setup, once: create the publisher `everbright-it` at
# <https://marketplace.visualstudio.com/manage>, then add VSCE_TOKEN as a
# masked, protected CI variable. The token is an Azure DevOps personal access
# token with Organization = "All accessible organizations" and Scope =
# Marketplace → Manage; anything narrower fails at verify-pat. Protected tags
# matter here exactly as above: on an unprotected tag the token arrives empty.
# vsce reads it as VSCE_PAT from the environment, so it never appears in a
# command line, a process list, or the job log.
#
# Be aware the token is not always obtainable: an Azure DevOps PAT requires an
# organization, and creating a NEW organization now requires an active Azure
# subscription. Without one there is no token page at all. The manage portal
# accepts a .vsix by web upload and needs no token; that is the documented way
# around it, and it is why these jobs may sit unused for a while. See
# apps/vscode/DEVELOPMENT.md.
.vsce-publish:
  stage: publish
  image: node:22-alpine
  cache: []
  before_script: []
  variables:
    VSCE_VERSION: '3.9.2'
    VSCE_PAT: $VSCE_TOKEN
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

publish-vsce-sbomlens:
  extends: .vsce-publish
  needs: [vsix]
  script:
    - test -n "$VSCE_TOKEN" || { echo "VSCE_TOKEN is not set. Add it as a masked, protected CI variable, and protect the release tags."; exit 1; }
    # Fail on a bad, expired or too-narrowly-scoped token before touching the
    # Marketplace.
    - npx --yes @vscode/vsce@$VSCE_VERSION verify-pat everbright-it
    # A tag that disagrees with the manifest would publish a mislabelled
    # extension under a version number nobody can correct afterwards.
    - node -e "const v=require('./apps/vscode/package.json').version; if ('v'+v !== process.env.CI_COMMIT_TAG) { console.error(`vsix is ${v}, tag is ${process.env.CI_COMMIT_TAG}`); process.exit(1); }"
    # --packagePath reads the manifest out of the vsix, so this needs no cwd
    # inside the extension. No --skip-duplicate: a republished version must
    # fail loudly rather than look like a success that did nothing.
    - npx --yes @vscode/vsce@$VSCE_VERSION publish --packagePath sbomlens.vsix

publish-vsce-ocmlens:
  extends: .vsce-publish
  needs: [vsix-ocm]
  script:
    - test -n "$VSCE_TOKEN" || { echo "VSCE_TOKEN is not set. Add it as a masked, protected CI variable, and protect the release tags."; exit 1; }
    - npx --yes @vscode/vsce@$VSCE_VERSION verify-pat everbright-it
    - node -e "const v=require('./apps/vscode-ocm/package.json').version; if ('v'+v !== process.env.CI_COMMIT_TAG) { console.error(`vsix is ${v}, tag is ${process.env.CI_COMMIT_TAG}`); process.exit(1); }"
    - npx --yes @vscode/vsce@$VSCE_VERSION publish --packagePath ocmlens.vsix

# GitLab releases for the tag, on BOTH instances. Releases are project
# metadata, not git data: the push mirror forwards the tag but never the
# release object. The same two jobs therefore run twice: internally on the
# tag push, and again on gitlab.com when the mirrored tag triggers the
# pipeline there. Each run creates the release in its own project with the
# job token; no extra credentials.
#
# Assets: job artifacts expire, so the vsix files and the self-SBOM go into
# the executing project's generic package registry first (permanent URLs,
# job-token auth). Requires the Packages feature to be enabled on the
# project (it is by default).
release-assets:
  stage: deploy
  needs: [vsix, vsix-ocm, self-sbom]
  image: alpine:3.22
  cache: []
  before_script: []
  script:
    - apk add --no-cache curl
    - PKG="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic"
    - 'curl -fsS --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file sbomlens.vsix "$PKG/sbomlens/$CI_COMMIT_TAG/sbomlens.vsix"'
    - 'curl -fsS --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file ocmlens.vsix "$PKG/ocmlens/$CI_COMMIT_TAG/ocmlens.vsix"'
    - 'curl -fsS --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "sbomlens-$CI_COMMIT_TAG.spdx.json" "$PKG/self-sbom/$CI_COMMIT_TAG/sbomlens-$CI_COMMIT_TAG.spdx.json"'
    # Release notes: this tag's CHANGELOG section. Entries carry their own
    # [SBOM Lens]/[OCM Lens] prefixes, so one release covers both products.
    - awk -v ver="${CI_COMMIT_TAG#v}" 'index($0,"## ["ver"]")==1{f=1;next} /^## \[/{f=0} f' CHANGELOG.md > changelog-section.md
    - '[ -s changelog-section.md ] || echo "_No CHANGELOG section found for this tag._" > changelog-section.md'
    - |
      {
        echo "One tag, two products: SBOM Lens and OCM Lens release in lockstep from this monorepo."
        echo
        cat changelog-section.md
        echo
        echo "Install: [SBOM Lens on Open VSX](https://open-vsx.org/extension/everbright-it/sbomlens) | [OCM Lens on Open VSX](https://open-vsx.org/extension/everbright-it/ocmlens)"
      } > release-notes.md
  artifacts:
    paths: [release-notes.md]
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Waits for the image gate on purpose: a release object should only appear
# for a build that passed every blocking check. NOT manual: the decision
# point stays the tag push (and, for the stores, the manual publish jobs).
release-gitlab:
  stage: publish
  needs: [release-assets, image-scan]
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  cache: []
  before_script: []
  script:
    - echo "Creating release $CI_COMMIT_TAG on $CI_SERVER_HOST"
  release:
    tag_name: $CI_COMMIT_TAG
    name: $CI_COMMIT_TAG
    description: release-notes.md
    assets:
      links:
        - name: sbomlens.vsix
          url: '$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/sbomlens/$CI_COMMIT_TAG/sbomlens.vsix'
          link_type: package
        - name: ocmlens.vsix
          url: '$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/ocmlens/$CI_COMMIT_TAG/ocmlens.vsix'
          link_type: package
        - name: 'sbomlens-$CI_COMMIT_TAG.spdx.json (self-SBOM)'
          url: '$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/self-sbom/$CI_COMMIT_TAG/sbomlens-$CI_COMMIT_TAG.spdx.json'
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG

# Self-hosting image, pushed to the project's container registry on tags.
docker:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: ['']
  cache: []
  before_script: []
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/deploy/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      --destination "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_TAG

# Blocks a release whose image ships known HIGH/CRITICAL fixable CVEs.
image-scan:
  stage: deploy
  needs: [docker]
  image:
    name: aquasec/trivy:latest
    entrypoint: ['']
  cache: []
  before_script: []
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    # --skip-dirs examples: the image ships synthetic demo SPDX documents
    # (invented package versions); trivy discovers SBOM files inside images
    # and would report their fictional packages as vulnerabilities.
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --skip-dirs /usr/share/nginx/html/examples "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# Dogfooding: every release ships its own SPDX SBOM, openable in SBOM Lens.
# Pinned syft binary on alpine instead of the anchore/syft image: that image
# is distroless (no shell, no sleep), which container-keepalive runners
# cannot start. The checksum pins the exact release.
self-sbom:
  stage: deploy
  needs: []
  image: alpine:3.22
  cache: []
  before_script: []
  variables:
    SYFT_VERSION: '1.46.0'
    SYFT_SHA256: 'd654f678b709eb53c393d38519d5ed7d2e57205529404018614cfefa0fb2b5ca'
  script:
    - wget -q "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" -O /tmp/syft.tgz
    - echo "$SYFT_SHA256  /tmp/syft.tgz" | sha256sum -c -
    - tar -xzf /tmp/syft.tgz -C /usr/local/bin syft
    - syft dir:. --source-name sbomlens --source-version "$CI_COMMIT_TAG" -o "spdx-json=sbomlens-$CI_COMMIT_TAG.spdx.json"
  artifacts:
    paths: [sbomlens-*.spdx.json]
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG

# test → build → GitLab Pages on the default branch (Pages root = the
# viewer); container image, vsix, image scan, and a self-SBOM on tags, then
# an optional manual publish of each extension to Open VSX.
# Security scanning runs on every push; Renovate runs in its own
# scheduled pipeline (see docs/ci-security.md).
stages: [test, build, deploy, publish]

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SAST_EXCLUDED_PATHS: '**/dist, **/dist-vscode, apps/vscode/media, packages/core/fixtures, apps/web/public/examples'
  # Diagnostic (temporary): the template analyzers finish without writing
  # their gl-*-report.json on this runner; debug logs show why.
  SECURE_LOG_LEVEL: 'debug'

default:
  image: node:22-alpine
  cache:
    key:
      files: [package-lock.json]
    paths: [.npm/]
  before_script:
    - npm ci --cache .npm --prefer-offline

test:
  stage: test
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - npm run lint
    - npm run typecheck
    - npm run test

# Known-vulnerability gate over the lockfile (blocking). Ignores, when ever
# needed, go into osv-scanner.toml; see docs/ci-security.md.
osv-scan:
  stage: test
  image:
    name: ghcr.io/google/osv-scanner:latest
    entrypoint: ['']
  cache: []
  before_script: []
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - /osv-scanner --lockfile=package-lock.json

# The security templates run per push too, but never in the Renovate schedule.
semgrep-sast:
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

secret_detection:
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - if: $CI_COMMIT_BRANCH || $CI_COMMIT_TAG

# Dependency updates as merge requests. Runs ONLY in a scheduled pipeline
# that sets RENOVATE_RUN=true; needs the RENOVATE_TOKEN CI variable
# (bot PAT, scopes api + write_repository). Setup: docs/ci-security.md.
renovate:
  stage: test
  image: renovate/renovate:latest
  cache: []
  before_script: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_RUN == "true"
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: $CI_API_V4_URL
    RENOVATE_REPOSITORIES: $CI_PROJECT_PATH
  script:
    - renovate

build:
  stage: build
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - npm run build
    # Brand-leak gate: the SBOM flavor must not carry OCM-Lens branding.
    - '! grep -riq "OCM Lens" apps/web/dist/index.html apps/web/dist/assets'
    # Separation gate: SBOM Lens is an SPDX viewer. Not one line of the
    # descriptor mapper, the tar reader, or the gzip path may reach its
    # bundle: that is what @sbomlens/core/ocm and HAS_DELIVERIES are for.
    # ("ustar" is NOT a marker: sniffContainer's magic-byte check belongs here.)
    - '! grep -raEq "TAR_CORRUPT|ARCHIVE_LIMIT_EXCEEDED|artifact-index\.json|componentReferences|DecompressionStream" apps/web/dist/assets'
  artifacts:
    paths: [apps/web/dist]
    expire_in: 1 week

# OCM Lens: the second product flavor built from the same codebase.
build-ocm:
  stage: build
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - when: on_success
  script:
    - npm run build:ocm
    # Brand-leak gate: the OCM flavor must not carry SBOM-Lens branding.
    - '! grep -riq "SBOM Lens" apps/web/dist-ocm/index.html apps/web/dist-ocm/assets'
    # Counter-check to the SBOM separation gate: a passing gate must mean
    # "correctly excluded", never "silently never built".
    - 'grep -raq "artifact-index.json" apps/web/dist-ocm/assets'
  artifacts:
    paths: [apps/web/dist-ocm]
    expire_in: 1 week

# Pages serves the viewer itself: https://<namespace>.gitlab.io/<project>/
# IS the app (vite base './' keeps the build relocatable). No landing-repo
# clone, no redirect: the landing page deploys to its own host from its own
# repo and is not part of this deployment.
pages:
  stage: deploy
  dependencies: [build]
  image: alpine:3.22
  cache: []
  before_script: []
  script:
    - rm -rf public
    - cp -a apps/web/dist public
  artifacts:
    paths: [public]
  rules:
    - if: $RENOVATE_RUN == "true"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# VS Code extension packages on tags; publishing them is a manual job below.
vsix:
  stage: deploy
  script:
    - npm run build:vscode -w @sbomlens/web
    - npm run compile -w sbomlens
    - npm run package -w sbomlens
  artifacts:
    paths: [sbomlens.vsix]
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

vsix-ocm:
  stage: deploy
  script:
    - npm run build:vscode-ocm -w @sbomlens/web
    - npm run compile -w ocmlens
    - npm run package -w ocmlens
  artifacts:
    paths: [ocmlens.vsix]
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

# Open VSX publishing, one job per product.
#
# MANUAL on purpose. A published version is immutable: it cannot be replaced
# or withdrawn, only superseded by a new version. Tagging must therefore never
# publish by itself: someone decides, per product, that this build is the one
# users get. Manual also keeps the ordering free, which matters while a
# listing is still being bootstrapped (a README that links to a sibling
# extension wants that sibling to exist first).
#
# Setup, once: OVSX_TOKEN as a masked, protected CI variable (Open VSX → user
# settings → access tokens; the account must own the `everbright-it`
# namespace), AND protect the release tags (Settings → Repository → Protected
# tags → `v*`). A protected variable only reaches pipelines on protected refs;
# on an unprotected tag the token arrives empty and the guard below stops the
# job. ovsx picks it up as OVSX_PAT from the environment, so the token never
# appears in a command line, a process list, or the job log.
#
# The VS Code Marketplace can extend the same shape (`vsce publish`) once its
# publisher exists; see apps/vscode/DEVELOPMENT.md.
.ovsx-publish:
  stage: publish
  image: node:22-alpine
  cache: []
  before_script: []
  variables:
    OVSX_VERSION: '1.0.2'
    OVSX_PAT: $OVSX_TOKEN
  rules:
    - if: $CI_COMMIT_TAG
      when: manual

publish-sbomlens:
  extends: .ovsx-publish
  needs: [vsix]
  script:
    - test -n "$OVSX_TOKEN" || { echo "OVSX_TOKEN is not set. Add it as a masked CI variable."; exit 1; }
    # Fail on a bad or expired token before touching the registry.
    - npx --yes ovsx@$OVSX_VERSION verify-pat everbright-it
    # A tag that disagrees with the manifest would publish a mislabelled
    # extension under a version number nobody can correct afterwards.
    - node -e "const v=require('./apps/vscode/package.json').version; if ('v'+v !== process.env.CI_COMMIT_TAG) { console.error(`vsix is ${v}, tag is ${process.env.CI_COMMIT_TAG}`); process.exit(1); }"
    - npx --yes ovsx@$OVSX_VERSION publish sbomlens.vsix

publish-ocmlens:
  extends: .ovsx-publish
  needs: [vsix-ocm]
  script:
    - test -n "$OVSX_TOKEN" || { echo "OVSX_TOKEN is not set. Add it as a masked CI variable."; exit 1; }
    - npx --yes ovsx@$OVSX_VERSION verify-pat everbright-it
    - node -e "const v=require('./apps/vscode-ocm/package.json').version; if ('v'+v !== process.env.CI_COMMIT_TAG) { console.error(`vsix is ${v}, tag is ${process.env.CI_COMMIT_TAG}`); process.exit(1); }"
    - npx --yes ovsx@$OVSX_VERSION publish ocmlens.vsix

# Self-hosting image, pushed to the project's container registry on tags.
docker:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: ['']
  cache: []
  before_script: []
  script:
    - /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/deploy/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      --destination "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_TAG

# Blocks a release whose image ships known HIGH/CRITICAL fixable CVEs.
image-scan:
  stage: deploy
  needs: [docker]
  image:
    name: aquasec/trivy:latest
    entrypoint: ['']
  cache: []
  before_script: []
  variables:
    TRIVY_USERNAME: $CI_REGISTRY_USER
    TRIVY_PASSWORD: $CI_REGISTRY_PASSWORD
  script:
    # --skip-dirs examples: the image ships synthetic demo SPDX documents
    # (invented package versions); trivy discovers SBOM files inside images
    # and would report their fictional packages as vulnerabilities.
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed --skip-dirs /usr/share/nginx/html/examples "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG

# Dogfooding: every release ships its own SPDX SBOM, openable in SBOM Lens.
# Pinned syft binary on alpine instead of the anchore/syft image: that image
# is distroless (no shell, no sleep), which container-keepalive runners
# cannot start. The checksum pins the exact release.
self-sbom:
  stage: deploy
  needs: []
  image: alpine:3.22
  cache: []
  before_script: []
  variables:
    SYFT_VERSION: '1.46.0'
    SYFT_SHA256: 'd654f678b709eb53c393d38519d5ed7d2e57205529404018614cfefa0fb2b5ca'
  script:
    - wget -q "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" -O /tmp/syft.tgz
    - echo "$SYFT_SHA256  /tmp/syft.tgz" | sha256sum -c -
    - tar -xzf /tmp/syft.tgz -C /usr/local/bin syft
    - syft dir:. --source-name sbomlens --source-version "$CI_COMMIT_TAG" -o "spdx-json=sbomlens-$CI_COMMIT_TAG.spdx.json"
  artifacts:
    paths: [sbomlens-*.spdx.json]
    expire_in: 1 year
  rules:
    - if: $CI_COMMIT_TAG
